name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0.0
  workflow_dispatch:   # Manual trigger

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: CommunityRobotArmUI-Windows
            ext: .zip
          - os: ubuntu-22.04
            artifact: CommunityRobotArmUI-Linux
            ext: .tar.gz
          - os: macos-latest
            artifact: CommunityRobotArmUI-macOS
            ext: .tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux: install Qt system deps
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx libegl1 libxkbcommon0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-shape0 libxcb-xinerama0 libxcb-randr0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyserial numpy
          pip install opencv-python-headless
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller CommunityRobotArmUI.spec --noconfirm

      # Package artifacts
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/CommunityRobotArmUI/* -DestinationPath ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}${{ matrix.ext }} -C dist CommunityRobotArmUI

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
