name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0.0
  workflow_dispatch:   # Manual trigger

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: CommunityRobotArmUI-Windows
          - os: ubuntu-22.04
            artifact: CommunityRobotArmUI-Linux
          - os: macos-latest
            artifact: CommunityRobotArmUI-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux: install Qt system deps
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx libegl1 libxkbcommon0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-shape0 libxcb-xinerama0 libxcb-randr0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyserial numpy Pillow
          pip install opencv-python-headless
          pip install onnxruntime
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller CommunityRobotArmUI.spec --noconfirm

      # --- Windows: Inno Setup installer ---
      - name: Build Windows Installer
        if: runner.os == 'Windows'
        run: iscc installer.iss

      - name: Upload Windows Installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-Setup
          path: installer_output/CommunityRobotArmUI-Setup.exe

      - name: Package Windows ZIP
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/CommunityRobotArmUI/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload Windows ZIP
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      # --- macOS: create .dmg ---
      - name: Create macOS DMG
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "CommunityRobotArmUI" \
            -srcfolder dist/CommunityRobotArmUI \
            -ov -format UDZO \
            ${{ matrix.artifact }}.dmg

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.dmg

      # --- Linux: create AppImage ---
      - name: Create Linux AppImage
        if: runner.os == 'Linux'
        run: |
          # Set up AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r dist/CommunityRobotArmUI/* AppDir/usr/bin/
          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/communityrobotarmui.png
          cp assets/icon.png AppDir/communityrobotarmui.png

          # Desktop entry
          cat > AppDir/communityrobotarmui.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Community Robot Arm UI
          Exec=CommunityRobotArmUI
          Icon=communityrobotarmui
          Categories=Utility;Engineering;
          EOF

          # AppRun script
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/CommunityRobotArmUI" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Download appimagetool and extract (FUSE not available on GH runners)
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract
          ./squashfs-root/AppRun AppDir ${{ matrix.artifact }}.AppImage

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.AppImage

      # --- Upload Raw Config Files for Release ---
      - name: Prepare Config Files
        if: runner.os == 'Linux'
        run: |
          mkdir -p release_configs
          cp config/colors/default_candy_colors.json release_configs/
          cp config/templates/default_pnp.gcode release_configs/
          
      - name: Upload Config Templates
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ConfigFiles
          path: release_configs/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
